name: Build TTLock APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build with Buildozer (Docker)
        run: |
          # 关键点：使用 -e BUILDOZER_WARN_ON_ROOT=1 彻底禁用交互式提问
          docker run --rm \
            -e BUILDOZER_WARN_ON_ROOT=1 \
            -v ${{ github.workspace }}:/app \
            -w /app \
            kivy/buildozer \
            -v android debug

      - name: Fix Permissions
        # 必须修复权限，否则后续的 Upload 步骤可能因为没有权限进入 bin 文件夹而失败
        if: always()
        run: |
          sudo chown -R $USER:$USER ${{ github.workspace }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ttlock-apk
          path: bin/*.apk
