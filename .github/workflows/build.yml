name: Build TTLock APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build with Buildozer Action
        uses: ArtemSBulgakov/buildozer-action@v1
        with:
          command: buildozer -v android debug   # 你原来的命令
          # workdir: .                          # 如果 buildozer.spec 不在根目录才需要改

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ttlockroot-apk
          path: bin/*.apk
