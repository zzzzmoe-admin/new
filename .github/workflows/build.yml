name: Build TTLock APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build with Buildozer (Docker)
        run: |
          # 1. 添加 -i 保持 stdin 打开
          # 2. 使用 echo "y" | 自动确认 root 警告（以防环境变量未生效）
          # 3. 保留 -e BUILDOZER_ROOT=1
          echo "y" | docker run --rm -i \
            -e BUILDOZER_ROOT=1 \
            -v ${{ github.workspace }}:/app \
            -w /app \
            kivy/buildozer \
            buildozer -v android debug

      - name: Fix Permissions (Optional but recommended)
        run: |
          # Docker 以 root 运行，生成的文件属于 root。
          # 将其所有权改回当前 runner 用户，防止上传或后续步骤权限报错。
          sudo chown -R $USER:$USER bin/ .buildozer/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ttlock-apk
          # 确保路径正确，有时文件名包含版本号，使用通配符更安全
          path: bin/*.apk
