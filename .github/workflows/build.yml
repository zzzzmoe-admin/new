name: Build TTLock APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build with Buildozer (Docker)
        run: |
          # 修复点：
          # 1. 去掉末尾多余的 'buildozer' 单词
          # 2. 保留 -i 和 echo "y" | 以解决交互和权限确认问题
          echo "y" | docker run --rm -i \
            -e BUILDOZER_ROOT=1 \
            -v ${{ github.workspace }}:/app \
            -w /app \
            kivy/buildozer \
            -v android debug

      - name: Fix Permissions
        run: |
          # 修复由 root 用户构建导致的文件权限问题
          sudo chown -R $USER:$USER bin/ .buildozer/ 2>/dev/null || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ttlock-apk
          path: bin/*.apk
