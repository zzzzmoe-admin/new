name: Build TTLock APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Accept Android SDK Licenses
        run: |
          docker run --rm -i \
            -v ${{ github.workspace }}:/app \
            -w /app \
            kivy/buildozer \
            sh -c "yes | sdkmanager --licenses"

      - name: Build with Buildozer (Docker)
        run: |
          docker run --rm -i \
            -e BUILDOZER_WARN_ON_ROOT=1 \
            -v ${{ github.workspace }}:/app \
            -w /app \
            kivy/buildozer \
            -v android debug

      - name: Fix Permissions
        run: |
          sudo chown -R $USER:$USER bin/ .buildozer/ 2>/dev/null || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ttlock-apk
          path: bin/*.apk
