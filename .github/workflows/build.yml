name: Build TTLock APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build TTLock APK with Buildozer (Docker)
        run: |
          docker run --rm \
            --user root \
            -v ${{ github.workspace }}:/home/user/app \
            -w /home/user/app \
            -e BUILDOZER_WARN_ON_ROOT=0 \
            kivy/buildozer:latest \
            buildozer -v android debug

      # 可选：修复文件权限（防止 artifact 上传权限问题）
      - name: Fix permissions
        run: sudo chown -R $(whoami) bin/ .buildozer/ 2>/dev/null || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ttlockroot-apk
          path: bin/*.apk
